name: API Version Tag

on:
  workflow_call:
    inputs:
      bump_type:
        description: 'Version bump: auto (conventional commits), patch, minor, or major'
        required: false
        type: string
        default: auto
    outputs:
      previous_version:
        description: The previous semver tag (e.g. v1.2.3)
        value: ${{ jobs.tag.outputs.previous_version }}
      new_version:
        description: The new semver tag (e.g. v1.2.4)
        value: ${{ jobs.tag.outputs.new_version }}

  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: false
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

jobs:
  tag:
    name: Bump and tag version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      previous_version: ${{ steps.bump.outputs.previous_version }}
      new_version:      ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: bump
        run: |
          git fetch --tags

          PREV=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          PREV=${PREV:-v0.0.0}
          echo "previous_version=${PREV}" >> "$GITHUB_OUTPUT"

          VERSION=${PREV#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          BUMP="${{ inputs.bump_type }}"

          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          elif [ "$BUMP" = "patch" ]; then
            PATCH=$((PATCH + 1))
          else
            # auto: derive bump from conventional commits since last tag
            COMMITS=$(git log "${PREV}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
            if echo "$COMMITS" | grep -qE '^(feat|fix|refactor|perf)(\(.+\))?!:|BREAKING CHANGE'; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'; then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
          fi

          NEW="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=${NEW}" >> "$GITHUB_OUTPUT"

          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$NEW"
          git push origin "$NEW"
