name: Golang Pipeline

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      go_version:
        required: false
        type: string
        default: '1.26.2'
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      GKE_CLUSTER:
        required: true
      GKE_ZONE:
        required: true
      GKE_WORKLOAD_PROVIDER:
        required: true
      GKE_SA:
        required: true

jobs:
  # ─── Setup: shared variables ───────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      branch:    ${{ steps.vars.outputs.branch }}
      namespace: ${{ steps.vars.outputs.namespace }}
    steps:
      - id: vars
        run: |
          BRANCH=$(echo "${{ github.head_ref || github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "namespace=${{ inputs.service_name }}-${BRANCH}" >> $GITHUB_OUTPUT

  # ─── Stage 1: Verify ───────────────────────────────────────
  verify:
    name: Verify
    needs: setup
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Security scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ─── Stage 2: Build ────────────────────────────────────────
  build:
    name: Build
    needs: [setup, verify]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/${{ inputs.service_name }}
          podman build \
            -t ${IMAGE}:${{ github.sha }} \
            -f build/Dockerfile .

  # ─── Stage 3: Publish ──────────────────────────────────────
  publish:
    name: Publish
    needs: [setup, build]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | \
          podman login docker.io \
            --username ${{ secrets.DOCKER_USERNAME }} \
            --password-stdin

      - name: Build and push
        run: |
          IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/${{ inputs.service_name }}
          BRANCH=branch_${{ needs.setup.outputs.branch }}

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            podman build -t ${IMAGE}:${BRANCH} -f build/Dockerfile .
            podman push ${IMAGE}:${BRANCH}
          else
            podman build \
              -t ${IMAGE}:${{ github.sha }} \
              -t ${IMAGE}:latest \
              -f build/Dockerfile .
            podman push ${IMAGE}:${{ github.sha }}
            podman push ${IMAGE}:latest
          fi


  # ─── Stage 6: Deploy DEV (main only) ───────────────────────
  deploy-dev:
    name: Deploy DEV
    needs: [setup, publish]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GKE_WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.GKE_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Deploy to DEV
        run: |
          IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/${{ inputs.service_name }}

          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER }} \
            --zone ${{ secrets.GKE_ZONE }} --project ${{ secrets.PROJECT_ID }}

          kubectl apply -f deploy/k8s/ -n dev

          kubectl set image deployment/${{ inputs.service_name }} ${{ inputs.service_name }}=${IMAGE}:${{ github.sha }} -n dev

          kubectl rollout status deployment/${{ inputs.service_name }} -n dev

  # ─── Stage 7: Deploy UAT (main only) ───────────────────────
  deploy-uat:
    name: Deploy UAT
    needs: [setup, deploy-dev]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: uat
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GKE_WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.GKE_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Deploy to UAT
        run: |
          IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/${{ inputs.service_name }}

          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER }} \
            --zone ${{ secrets.GKE_ZONE }} --project ${{ secrets.PROJECT_ID }}

          kubectl apply -f deploy/k8s/ -n uat

          kubectl set image deployment/${{ inputs.service_name }} \
            ${{ inputs.service_name }}=${IMAGE}:${{ github.sha }} \
            -n uat

          kubectl rollout status deployment/${{ inputs.service_name }} -n uat

  # ─── Stage 8: Deploy Production (main only) ────────────────
  deploy-production:
    name: Deploy Production
    needs: [setup, deploy-uat]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GKE_WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.GKE_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Deploy to Production
        run: |
          IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/${{ inputs.service_name }}

          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER }} \
            --zone ${{ secrets.GKE_ZONE }} --project ${{ secrets.PROJECT_ID }}

          kubectl apply -f deploy/k8s/ -n production

          kubectl set image deployment/${{ inputs.service_name }} \
            ${{ inputs.service_name }}=${IMAGE}:${{ github.sha }} \
            -n production

          kubectl rollout status deployment/${{ inputs.service_name }} -n production