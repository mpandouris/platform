name: Golang Pipeline

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      go_version:
        required: false
        type: string
        default: '1.26.2'
      allow_feature_branch_deployment:
        required: false
        type: boolean
        default: false
    secrets:
      PROJECT_ID:
        required: true
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      GKE_CLUSTER:
        required: true
      GKE_ZONE:
        required: true
      GKE_WORKLOAD_PROVIDER:
        required: true
      GKE_SA:
        required: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      branch:    ${{ steps.vars.outputs.branch }}
      namespace: ${{ steps.vars.outputs.namespace }}
      image_tag:  ${{ steps.vars.outputs.image_tag }}
    steps:
      - id: vars
        run: |
          BRANCH=$(echo "${{ github.head_ref || github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "namespace=${{ inputs.service_name }}-${BRANCH}" >> $GITHUB_OUTPUT

          if [ "${{ github.event_name }}" == "pull_request" ] || [ "${{ github.ref }}" != "refs/heads/main" ]; then
          echo "image_tag=branch_${BRANCH}" >> $GITHUB_OUTPUT
          else
            echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

  verify:
    name: Verify
    needs: setup
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Security scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  publish:
    name: Publish
    needs: [setup, verify]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | \
          podman login docker.io \
            --username ${{ secrets.DOCKER_USERNAME }} \
            --password-stdin

      - name: Build and push
        run: |
          IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/${{ inputs.service_name }}
          TAG=${{ needs.setup.outputs.image_tag }}

          podman build -t ${IMAGE}:${TAG} -f build/Dockerfile .
          podman push ${IMAGE}:${TAG}

  deploy-dev:
    name: Deploy DEV
    needs: [setup, publish]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || inputs.allow_feature_branch_deployment == true
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: mpandouris/platform/.github/actions/kustomize-deploy@stable
        with:
          overlay: dev
          service_name: ${{ inputs.service_name }}
          branch: ${{ needs.setup.outputs.branch }}
          image: docker.io/${{ secrets.DOCKER_USERNAME }}/${{ inputs.service_name }}
          sha: ${{ needs.setup.outputs.image_tag }}
          gke_cluster: ${{ secrets.GKE_CLUSTER }}
          gke_zone: ${{ secrets.GKE_ZONE }}
          gke_workload_provider: ${{ secrets.GKE_WORKLOAD_PROVIDER }}
          gke_sa: ${{ secrets.GKE_SA }}
          project_id: ${{ secrets.PROJECT_ID }}

  deploy-uat:
    name: Deploy UAT
    needs: [setup, deploy-dev]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || inputs.allow_feature_branch_deployment == true
    runs-on: ubuntu-latest
    environment: uat
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: mpandouris/platform/.github/actions/kustomize-deploy@stable
        with:
          overlay: uat
          service_name: ${{ inputs.service_name }}
          branch: ${{ needs.setup.outputs.branch }}
          image: docker.io/${{ secrets.DOCKER_USERNAME }}/${{ inputs.service_name }}
          sha: ${{ needs.setup.outputs.image_tag }}
          gke_cluster: ${{ secrets.GKE_CLUSTER }}
          gke_zone: ${{ secrets.GKE_ZONE }}
          gke_workload_provider: ${{ secrets.GKE_WORKLOAD_PROVIDER }}
          gke_sa: ${{ secrets.GKE_SA }}
          project_id: ${{ secrets.PROJECT_ID }}

  deploy-production:
    name: Deploy Production
    needs: [setup, deploy-uat]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: mpandouris/platform/.github/actions/kustomize-deploy@stable
        with:
          overlay: production
          service_name: ${{ inputs.service_name }}
          branch: ${{ needs.setup.outputs.branch }}
          image: docker.io/${{ secrets.DOCKER_USERNAME }}/${{ inputs.service_name }}
          sha: ${{ needs.setup.outputs.image_tag }}
          gke_cluster: ${{ secrets.GKE_CLUSTER }}
          gke_zone: ${{ secrets.GKE_ZONE }}
          gke_workload_provider: ${{ secrets.GKE_WORKLOAD_PROVIDER }}
          gke_sa: ${{ secrets.GKE_SA }}
          project_id: ${{ secrets.PROJECT_ID }}
  
  cleanup:
    name: Cleanup Feature Branch
    needs: [setup]
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && needs.setup.outputs.branch != 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GKE_WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.GKE_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Cleanup branch deployments
        run: |
          BRANCH=${{ needs.setup.outputs.branch }}
          SUFFIX="-${BRANCH}"

          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER }} \
            --zone ${{ secrets.GKE_ZONE }} \
            --project ${{ secrets.PROJECT_ID }}

          for NS in dev uat; do
            echo "→ Cleaning up ${{ inputs.service_name }}${SUFFIX} in ${NS}..."

            if kubectl get deployment ${{ inputs.service_name }}${SUFFIX} -n ${NS} &>/dev/null; then
              kubectl delete deployment ${{ inputs.service_name }}${SUFFIX} -n ${NS}
              kubectl delete service ${{ inputs.service_name }}${SUFFIX} -n ${NS} --ignore-not-found
              echo "✔ Removed ${{ inputs.service_name }}${SUFFIX} from ${NS}"
            else
              echo "→ No deployment found in ${NS}, skipping"
            fi
          done